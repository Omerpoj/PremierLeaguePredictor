<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier League AI Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>⚽ Premier League AI</h2>
            <div style="margin-bottom: 20px;">
                <a href="/analytics" style="text-decoration: none; font-size: 14px; color: #555;">📈 View Model Analytics</a>
            </div>

        <div class="matchup-display">
            <div class="team-card">
                <img id="home-logo" src="https://ui-avatars.com/api/?name=Home&background=random&color=fff&size=100" alt="Home Team">
                <h3 id="home-name-display">Home</h3>
            </div>
            <div class="vs-badge">VS</div>
            <div class="team-card">
                <img id="away-logo" src="https://ui-avatars.com/api/?name=Away&background=random&color=fff&size=100" alt="Away Team">
                <h3 id="away-name-display">Away</h3>
            </div>
        </div>

        <form id="prediction-form">
            <div class="form-group">
                <label for="home_team">Home Team:</label>
                <select name="home_team" id="home_team" required>
                    <option value="" disabled selected>Select Home Team...</option>
                    {% for team in teams %}
                        <option value="{{ team }}">{{ team }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="away_team">Away Team:</label>
                <select name="away_team" id="away_team" required>
                    <option value="" disabled selected>Select Away Team...</option>
                    {% for team in teams %}
                        <option value="{{ team }}">{{ team }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" id="predict-btn">Predict Match</button>
        </form>

        <div id="result-container" class="result" style="display: none;"></div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
